{% extends 'base.html' %}
{% block topbar %}{{ accion }} canción{% endblock %}
{% block content %}
<div class="page-header"><div><h2>{{ accion }} canción</h2><div class="hint">El álbum y artista se guardan como referencias lógicas/subdocumentos</div></div><a class="btn secondary" href="{% url 'canciones' %}">← Volver</a></div>
<div class="card"><form method="post">{% csrf_token %}<div class="form-grid"><div class="form-group"><label>Título *</label><input name="titulo_cancion" value="{{ item.titulo_cancion|default:'' }}" required></div><div class="form-group"><label>Álbum</label><select name="album_id"><option value="">Seleccione álbum</option>{% for a in albumes %}<option value="{{ a.id_str }}" {% if item.album.nombre_album == a.nombre_album %}selected{% endif %}>{{ a.nombre_album }} — {{ a.artista.nombre_artista }}</option>{% endfor %}</select></div><div class="form-group"><label>Duración segundos</label><input name="duracion_segundos" type="number" value="{{ item.duracion_segundos|default:0 }}"></div><div class="form-group"><label>Estado</label><select name="estado_cancion"><option value="Activa" {% if item.estado_cancion == 'Activa' %}selected{% endif %}>Activa</option><option value="Inactiva" {% if item.estado_cancion == 'Inactiva' %}selected{% endif %}>Inactiva</option></select></div><div class="form-group"><label>Reproducciones</label><input name="reproducciones_totales" type="number" value="{{ item.reproducciones_totales|default:0 }}"></div><div class="form-group"><label>Likes</label><input name="likes_totales" type="number" value="{{ item.likes_totales|default:0 }}"></div><div class="form-group form-full"><label>Géneros separados por coma</label><input name="generos" value="{% for g in item.generos %}{{ g }}{% if not forloop.last %}, {% endif %}{% endfor %}" placeholder="Pop, Rock, Andina"></div></div><br><button class="btn">Guardar en MongoDB</button> <a class="btn secondary" href="{% url 'canciones' %}">Cancelar</a></form></div>
{% endblock %}
