{% extends 'base.html' %}
{% block topbar %}{{ accion }} usuario{% endblock %}
{% block content %}
<div class="page-header"><div><h2>{{ accion }} usuario</h2><div class="hint">CRUD sobre colección <span class="mono">usuarios</span></div></div><a class="btn secondary" href="{% url 'usuarios' %}">← Volver</a></div>
<div class="card"><form method="post">{% csrf_token %}<div class="form-grid"><div class="form-group"><label>Nombre *</label><input name="nombre_usuario" value="{{ item.nombre_usuario|default:'' }}" required></div><div class="form-group"><label>Email *</label><input name="email_usuario" type="email" value="{{ item.email_usuario|default:'' }}" required></div><div class="form-group"><label>País</label><input name="pais_usuario" value="{{ item.pais_usuario|default:'' }}"></div><div class="form-group"><label>Tipo</label><select name="tipo_usuario"><option value="Free" {% if item.tipo_usuario == 'Free' %}selected{% endif %}>Free</option><option value="Premium" {% if item.tipo_usuario == 'Premium' %}selected{% endif %}>Premium</option></select></div><div class="form-group"><label>Estado</label><select name="estado_usuario"><option value="Activo" {% if item.estado_usuario == 'Activo' %}selected{% endif %}>Activo</option><option value="Bloqueado" {% if item.estado_usuario == 'Bloqueado' %}selected{% endif %}>Bloqueado</option></select></div></div><br><button class="btn">Guardar en MongoDB</button> <a class="btn secondary" href="{% url 'usuarios' %}">Cancelar</a></form></div>
{% endblock %}
