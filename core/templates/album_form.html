{% extends 'base.html' %}
{% block topbar %}{{ accion }} álbum{% endblock %}
{% block content %}
<div class="page-header"><div><h2>{{ accion }} álbum</h2><div class="hint">El artista se guarda como subdocumento dentro del álbum</div></div><a class="btn secondary" href="{% url 'albumes' %}">← Volver</a></div>
<div class="card"><form method="post">{% csrf_token %}<div class="form-grid"><div class="form-group"><label>Nombre del álbum *</label><input name="nombre_album" value="{{ item.nombre_album|default:'' }}" required></div><div class="form-group"><label>Artista</label><select name="artista_id"><option value="">Seleccione artista</option>{% for a in artistas %}<option value="{{ a.id_str }}" {% if item.artista.nombre_artista == a.nombre_artista %}selected{% endif %}>{{ a.nombre_artista }}</option>{% endfor %}</select></div><div class="form-group"><label>Fecha lanzamiento</label><input name="fecha_lanzamiento" type="date" value="{{ item.fecha_lanzamiento|default:'' }}"></div><div class="form-group"><label>Estado</label><select name="estado_album"><option value="Publicado" {% if item.estado_album == 'Publicado' %}selected{% endif %}>Publicado</option><option value="Borrador" {% if item.estado_album == 'Borrador' %}selected{% endif %}>Borrador</option><option value="Oculto" {% if item.estado_album == 'Oculto' %}selected{% endif %}>Oculto</option></select></div></div><br><button class="btn">Guardar en MongoDB</button> <a class="btn secondary" href="{% url 'albumes' %}">Cancelar</a></form></div>
{% endblock %}
